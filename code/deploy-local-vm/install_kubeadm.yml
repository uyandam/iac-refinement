---
- name: Install kubeadm on Ubuntu 24.04
  hosts: localhost
  connection: local
  become: true

  vars:
    k8s_version: "1.32"
    k8s_apt_keyring: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    k8s_apt_repo: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/"

  tasks:

    - name: Disable apt valid-until check to fix clock-skew issue
      copy:
        dest: /etc/apt/apt.conf.d/99no-check-valid-until
        content: |
          Acquire::Check-Valid-Until "false";
          Acquire::Check-Date "false";
        mode: "0644"

    - name: Install prerequisite packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Ensure /etc/apt/keyrings directory exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Kubernetes apt GPG key
      shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key \
          | gpg --dearmor -o {{ k8s_apt_keyring }}
      args:
        creates: "{{ k8s_apt_keyring }}"

    - name: Add Kubernetes apt repository
      apt_repository:
        repo: "deb [signed-by={{ k8s_apt_keyring }}] {{ k8s_apt_repo }} /"
        filename: kubernetes
        state: present

    - name: Install kubelet, kubeadm, and kubectl
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: true

    - name: Hold kubelet, kubeadm, and kubectl at current version
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: Verify kubeadm installation
      command: kubeadm version
      register: kubeadm_ver
      changed_when: false

    - name: Show kubeadm version
      debug:
        msg: "{{ kubeadm_ver.stdout }}"
